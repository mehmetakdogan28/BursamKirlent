<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kırlent Modelleri | Bursam Kırlent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f9f9f9; }
        .product-card { background: white; border-radius: 8px; transition: all 0.3s ease; border: 1px solid #eee; }
        .product-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.05); transform: translateY(-3px); border-color: #10402e; }
    </style>
</head>
<body>

    <nav class="w-full bg-white border-b border-gray-100 py-5 px-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-[#10402e] tracking-tighter">BURSAM <span class="text-[#c5a059]">KIRLENT</span></a>
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-[#10402e] transition">← Ana Sayfaya Dön</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-16 px-6">
        <div class="mb-12">
            <h1 class="text-4xl font-bold text-gray-900">Kırlent Koleksiyonu</h1>
            <p class="text-gray-500 mt-2">Dayanıklı, estetik ve konforlu 74 farklı model.</p>
        </div>
        
        <div id="maza-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Ürünler buraya gelecek -->
        </div>
    </div>

    <!-- Alt Bilgi (Aynısını Buraya da Ekledik) -->
    <footer class="py-16 bg-[#0a1118] text-gray-400 px-6">
        <div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-12 items-center">
            <div>
                <h3 class="text-white text-xl font-bold uppercase">BURSAM <span class="text-[#c5a059]">KIRLENT</span></h3>
                <p class="mt-2 text-sm text-gray-500">Bursa'nın kalitesini evinize getiriyoruz.</p>
            </div>
            <div class="space-y-3">
                <p class="flex items-center gap-3 text-sm"><i class="fab fa-whatsapp text-green-500 text-lg"></i> +90 505 111 35 52</p>
                <p class="flex items-center gap-3 text-sm"><i class="fas fa-envelope text-[#c5a059]"></i> mehmetakdogan152533@gmail.com</p>
                <p class="flex items-center gap-3 text-sm"><i class="fas fa-map-marker-alt text-red-500"></i> Bursa / Osmangazi</p>
            </div>
            <div class="md:text-right text-xs text-gray-600">
                <p>© 2026 BURSAM KIRLENT</p>
            </div>
        </div>
    </footer>

    <script>
        const container = document.getElementById('maza-container');
        for(let i=1; i<=74; i++) {
            container.innerHTML += `
                <div class="product-card p-4">
                    <div class="aspect-square overflow-hidden mb-4 rounded-md bg-gray-50">
                        <img src="img/model_${i}.jpg" alt="Model BK-${i}" class="w-full h-full object-cover">
                    </div>
                    <div class="text-left space-y-1">
                        <p class="text-[10px] text-[#c5a059] font-bold uppercase">Model BK-${i}</p>
                        <h3 class="text-sm font-bold text-gray-800">Özel Seri Kırlent</h3>
                        <p class="text-[11px] text-gray-400">43x43 cm • 1. Kalite Kadife</p>
                        <a href="https://wa.me/905051113552?text=Merhaba, BK-${i} modelini sipariş vermek istiyorum." 
                           class="mt-4 block text-center py-2 bg-white border border-[#10402e] text-[#10402e] font-bold text-[10px] rounded hover:bg-[#10402e] hover:text-white transition uppercase tracking-tighter">
                           Sipariş Ver
                        </a>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
